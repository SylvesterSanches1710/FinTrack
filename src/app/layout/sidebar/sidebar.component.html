<div class="sidebar">
  <div class="sidebar-top">
    <!-- LOGO -->
    <div class="sidebar-brand">
      <svg
        class="brand-logo"
        viewBox="0 0 320 88"
        xmlns="http://www.w3.org/2000/svg"
      >
        <!-- ICON -->

        <rect width="88" height="88" rx="22" fill="#2b6fff" />

        <rect
          x="17"
          y="53"
          width="14"
          height="18"
          rx="3"
          fill="white"
          opacity="0.45"
        />

        <rect
          x="36"
          y="40"
          width="14"
          height="31"
          rx="3"
          fill="white"
          opacity="0.7"
        />

        <rect x="55" y="27" width="14" height="44" rx="3" fill="white" />

        <polyline
          points="55,24 62,16 71,26"
          fill="none"
          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />

        <!-- TITLE -->

        <text
          x="108"
          y="42"
          fill="white"
          font-size="30"
          font-weight="700"
          font-family="Inter, sans-serif"
        >
          Fintrack
        </text>

        <!-- SLOGAN -->

        <text
          x="108"
          y="70"
          fill="#6b7280"
          font-size="14"
          letter-spacing="0.8"
          font-family="Inter, sans-serif"
        >
          YOUR MONEY, SIMPLIFIED
        </text>
      </svg>
    </div>
    <button class="mobile-close" (click)="closeSidebar()">✕</button>
  </div>

  <!-- MAIN -->
  <div class="section-title">MAIN</div>

  <nav>
    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>
    <a
      routerLink="/transactions"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-arrows-right-left"></i> Transactions
    </a>
    <a
      routerLink="/analytics"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-chart-pie"></i> Analytics
    </a>
  </nav>

  <!-- MONEY -->
  <div class="section-title second">MONEY</div>

  <nav>
    <a
      routerLink="/accounts"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-building-bank"></i> Accounts
    </a>
    <a
      routerLink="/transfers"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-switch-horizontal"></i> Transfers
    </a>
    <a
      routerLink="/budgets"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-wallet"></i> Budgets
    </a>
    <a
      routerLink="/goals"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-target"></i> Goals
    </a>
    <a
      routerLink="/recurring"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-repeat"></i> Recurring
    </a>

    <a
      routerLink="/investments"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-chart-candle"></i>

      Investments
    </a>

    <a
      routerLink="/lent-money"
      routerLinkActive="active"
      (click)="navigateAndClose()"
    >
      <i class="ti ti-moneybag"></i> Lent Money
    </a>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <i class="ti ti-logout"></i>

        Logout
      </button>
    </div>
  </nav>
</div>
