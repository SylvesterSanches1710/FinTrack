<form (ngSubmit)="addTransaction()" class="transaction-form">
  <!-- TYPE -->
  <div class="type-toggle">
    <button
      type="button"
      [class.active]="type === 'Expense'"
      (click)="type = 'Expense'"
    >
      <i class="ti ti-trending-down"></i> Expense
    </button>
    <button
      type="button"
      [class.active]="type === 'Income'"
      (click)="type = 'Income'"
    >
      <i class="ti ti-trending-up"></i> Income
    </button>
    <button
      type="button"
      [class.active]="type === 'Transfer'"
      (click)="type = 'Transfer'"
    >
      <i class="ti ti-switch-horizontal"></i> Transfer
    </button>
  </div>

  <!-- AMOUNT -->
  <div class="form-group">
    <label>Amount</label>
    <div class="input-prefix">
      <span>₹</span>
      <input type="number" [(ngModel)]="amount" name="amount" placeholder="0" />
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="form-group">
    <label>Category</label>
    <div class="category-chips">
      <button
        type="button"
        *ngFor="let c of categories"
        class="chip"
        [class.active-chip]="selectedCategory === c"
        (click)="selectedCategory = c"
      >
        {{ c }}
      </button>
      <button
        type="button"
        class="add-category-chip"
        (click)="showCategoryInput = !showCategoryInput"
      >
        <i class="ti ti-plus"></i> Category
      </button>
    </div>

    <div class="new-category-box" *ngIf="showCategoryInput">
      <input
        type="text"
        placeholder="New category name"
        [(ngModel)]="newCategory"
        name="newCategory"
      />
      <button type="button" (click)="addCategory()">Add</button>
    </div>
  </div>

  <!-- ACCOUNT -->
  <div class="form-group">
    <label>Account</label>
    <select [(ngModel)]="account" name="account">
      <option value="" disabled>Select account</option>
      <option *ngFor="let acc of accounts" [value]="acc.name">
        {{ acc.name }}
      </option>
    </select>
  </div>

  <!-- NOTES -->
  <div class="form-group">
    <label>Notes <span class="optional">optional</span></label>
    <input
      type="text"
      [(ngModel)]="notes"
      name="notes"
      placeholder="What was this for?"
    />
  </div>

  <!-- DATE -->
  <div class="form-group">
    <label>Date</label>
    <input type="date" [(ngModel)]="date" name="date" />
  </div>

  <!-- SUBMIT -->
  <button type="submit" class="submit-btn">
    {{ editMode ? "Update Transaction" : "Add Transaction" }}
  </button>
</form>
