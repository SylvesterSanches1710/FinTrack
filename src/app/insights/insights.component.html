<h2>Smart Insights 💡</h2>

<div class="insights-grid">
  <div class="insight-card">
    <p>Total Expenses</p>
    <h3>₹{{ totalExpense }}</h3>
  </div>

  <div class="insight-card">
    <p>Top Category</p>
    <h3>{{ topCategory }}</h3>
  </div>

  <div class="insight-card">
    <p>Highest Expense</p>
    <h3>₹{{ highestExpense }}</h3>
  </div>

  <div class="insight-card">
    <p>Total Transactions</p>
    <h3>{{ transactionCount }}</h3>
  </div>
</div>
